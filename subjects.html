

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Buster - Choose Subject</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; }
    
    .glass-card { 
      background: rgba(30, 41, 59, 0.5); 
      -webkit-backdrop-filter: blur(10px); 
      backdrop-filter: blur(10px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
    }
    .subject-card:hover { border-color: #6366f1; box-shadow: 0 0 20px rgba(99, 102, 241, 0.2); transform: translateY(-5px); }
    .meta-pill { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); padding: 6px 16px; border-radius: 99px; font-weight: 600; color: #818cf8; }
    .hidden { display: none; }
  </style>
</head>
<body class="text-slate-200">

  <nav class="fixed w-full z-50 top-0 bg-[#0f172a]/80 backdrop-blur-md border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Brain Buster</a>
      <ul class="flex space-x-6 font-medium text-sm text-slate-400">
        <li><a href="index.html" class="hover:text-white">Home</a></li>
        <li><a href="subjects.html" class="text-white">Subjects</a></li>
        <li><a href="admin.html" class="hover:text-white">Admin</a></li>
      </ul>
    </div>
  </nav>

  <header class="pt-32 pb-12 px-6 text-center">
    <h1 class="text-4xl font-extrabold text-white">Choose Your Challenge</h1>
    <p class="text-slate-400 mt-3">Select a subject to test your skills under the clock.</p>
  </header>

  <main class="max-w-7xl mx-auto px-6 pb-24 space-y-12">
    
    <section id="subjectSelection">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="subjectGrid">
        </div>
    </section>

    <section id="quizPanel" class="hidden">
      <div class="max-w-3xl mx-auto glass-card p-8 rounded-[2.5rem] shadow-2xl">
        <div class="flex flex-wrap gap-3 justify-center mb-10">
          <div class="meta-pill">📚 <span id="currentSubject">-</span></div>
          <div class="meta-pill text-amber-400 border-amber-500/20 bg-amber-500/10">⏱️ <span id="timeLeft">300</span>s</div>
          <div class="meta-pill">❓ Q: <span id="questionCount">0</span></div>
        </div>

        <div id="quiz" class="min-h-[300px]">
          </div>

        <div class="mt-10 flex gap-4">
          <button id="submitQuiz" class="hidden flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-500/20 transition-all">Submit Quiz</button>
          <button id="resetQuiz" class="hidden px-8 py-4 border border-white/10 rounded-2xl hover:bg-white/5 transition-all text-slate-400">Reset</button>
        </div>
      </div>
    </section>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <section id="resultPanel" class="hidden lg:col-span-5">
        <div class="glass-card p-8 rounded-3xl border-emerald-500/20">
          <h2 class="text-2xl font-bold text-white mb-6">Quiz Result</h2>
          <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="p-4 bg-white/5 rounded-2xl">
              <span class="block text-xs uppercase tracking-widest text-slate-500 mb-1">Score</span>
              <span id="score" class="text-3xl font-black text-indigo-400">0</span>
            </div>
            <div class="p-4 bg-white/5 rounded-2xl">
              <span class="block text-xs uppercase tracking-widest text-slate-500 mb-1">Percentage</span>
              <span id="percentage" class="text-3xl font-black text-indigo-400">0%</span>
            </div>
          </div>

          <form id="saveScoreForm" class="space-y-4">
            <input id="playerName" type="text" placeholder="Your Name" class="w-full bg-slate-900/50 border border-white/10 rounded-xl p-4 text-white focus:ring-2 focus:ring-indigo-500 outline-none" required>
            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-emerald-500/20">Save to Leaderboard</button>
          </form>
          
          <div id="review" class="mt-8 space-y-4 max-h-60 overflow-y-auto pr-2 custom-scrollbar"></div>
        </div>
      </section>

      <section class="lg:col-span-7">
        <div class="glass-card p-8 rounded-3xl">
          <h2 class="text-2xl font-bold text-white mb-6 flex justify-between items-center">
            Hall of Fame 🏆
            <span class="text-xs font-normal text-slate-500 uppercase tracking-widest">Top Scores</span>
          </h2>
          <div id="leaderboard" class="space-y-3">
            </div>
        </div>
      </section>

    </div>
  </main>

  <footer class="py-12 text-center border-t border-white/5 opacity-50 text-sm">
    <p>© 2026 Yash Bansal • Built for Galgotias College</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Buster - Admin Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background-color: #0f172a; 
    }

    /* Fixed Safari compatibility & CSS Diagnostics */
    .glass-card { 
      background: rgba(30, 41, 59, 0.7); 
      -webkit-backdrop-filter: blur(12px); /* Safari support */
      backdrop-filter: blur(12px); 
      border: 1px solid rgba(255, 255, 255, 0.05); 
    }

    /* Accessibility focus styling */
    input, select, textarea { 
      background: rgba(15, 23, 42, 0.6) !important; 
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: white !important;
    }

    /* Replaced 'ring' with standard 'box-shadow' for CSS validation */
    input:focus, select:focus, textarea:focus {
      border-color: #6366f1 !important;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.5);
      outline: none;
    }

    /* Custom scrollbar for inventory */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.3);
      border-radius: 10px;
    }
  </style>
</head>
<body class="text-slate-200 min-h-screen">

  <nav class="border-b border-white/5 py-4 px-6 flex justify-between items-center bg-[#0f172a]/80 backdrop-blur-md sticky top-0 z-50">
    <div class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
      Brain Buster Admin
    </div>
    <div class="space-x-6 text-sm font-medium">
      <a href="index.html" class="text-slate-400 hover:text-white transition">Home</a>
      <a href="subjects.html" class="text-slate-400 hover:text-white transition">Subjects</a>
    </div>
  </nav>

  <header class="py-12 px-6 max-w-7xl mx-auto text-center md:text-left">
    <h1 class="text-4xl font-extrabold text-white">Question Editor</h1>
    <p class="text-slate-400 mt-2">Manage your local database and expand your quiz library.</p>
  </header>

  <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-12 gap-8 pb-20">
    
    <section class="lg:col-span-5">
      <div class="glass-card p-8 rounded-3xl shadow-2xl">
        <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
          <span class="w-2 h-6 bg-indigo-500 rounded-full" aria-hidden="true"></span>
          Add New Question
        </h2>
        
        <form id="adminForm" class="space-y-5">
          <div>
            <label for="adminSubject" class="block text-sm font-semibold text-slate-400 mb-2">Subject Category <span class="text-red-500">*</span></label>
            <select id="adminSubject" title="Choose a quiz category" class="w-full p-4 rounded-xl transition cursor-pointer" required>
              <option value="">Choose category...</option>
              <option value="history">History</option>
              <option value="gk">General Knowledge</option>
              <option value="coding">Coding (MERN Stack)</option>
              <option value="aptitude">Aptitude</option>
              <option value="reasoning">Reasoning</option>
            </select>
          </div>

          <div>
            <label for="questionText" class="block text-sm font-semibold text-slate-400 mb-2">Question <span class="text-red-500">*</span></label>
            <textarea id="questionText" title="Type your question here" rows="3" class="w-full p-4 rounded-xl transition" placeholder="e.g. Which hook is used for state in React?" required></textarea>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label for="option1" class="text-xs font-semibold text-slate-500 uppercase ml-1">Option 1</label>
              <input id="option1" type="text" title="Enter choice 1" placeholder="Choice A" class="w-full p-3 rounded-xl transition" required>
            </div>
            <div>
              <label for="option2" class="text-xs font-semibold text-slate-500 uppercase ml-1">Option 2</label>
              <input id="option2" type="text" title="Enter choice 2" placeholder="Choice B" class="w-full p-3 rounded-xl transition" required>
            </div>
            <div>
              <label for="option3" class="text-xs font-semibold text-slate-500 uppercase ml-1">Option 3</label>
              <input id="option3" type="text" title="Enter choice 3" placeholder="Choice C" class="w-full p-3 rounded-xl transition" required>
            </div>
            <div>
              <label for="option4" class="text-xs font-semibold text-slate-500 uppercase ml-1">Option 4</label>
              <input id="option4" type="text" title="Enter choice 4" placeholder="Choice D" class="w-full p-3 rounded-xl transition" required>
            </div>
          </div>

          <div>
            <label for="correctAnswer" class="block text-sm font-semibold text-emerald-400 mb-2 ml-1">Correct Answer <span class="text-red-500">*</span></label>
            <input id="correctAnswer" type="text" title="Enter the exact correct answer" class="w-full p-4 rounded-xl border-emerald-500/30" placeholder="Must match one option text" required>
          </div>

          <div class="pt-6 flex flex-col gap-3">
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-indigo-500/20 active:scale-[0.98]">
              Publish Question
            </button>
            <button type="button" id="clearCustomQuestions" class="w-full border border-red-500/30 text-red-400 hover:bg-red-500/10 font-medium py-3 rounded-2xl transition">
              Clear All Data
            </button>
          </div>
        </form>
      </div>
    </section>

    <section class="lg:col-span-7">
      <div class="glass-card p-8 rounded-3xl min-h-[600px] flex flex-col">
        <h2 class="text-xl font-bold text-white mb-6">Inventory List</h2>
        <div id="customQuestionsList" class="flex-grow space-y-4 max-h-[720px] overflow-y-auto pr-2 custom-scrollbar">
          <div class="text-center py-32 border-2 border-dashed border-white/5 rounded-3xl">
            <p class="text-slate-500 italic">No custom questions added yet. Use the form on the left to start.</p>
          </div>
        </div>
      </div>
    </section>

  </main>

  <footer class="py-12 text-center border-t border-white/5 opacity-50 text-sm">
    <p>© 2026 Yash Bansal • Galgotias College CSD</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>

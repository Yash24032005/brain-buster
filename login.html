<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Buster - Login</title>
  <link rel="stylesheet" href="quiz2.css">
</head>
<body>
  <button class="theme-toggle" id="toggle-theme" type="button" aria-label="Toggle theme">🌙</button>

  <main class="auth-page">
    <section class="auth-card">
      <h1>Login</h1>
      <p>Welcome back to Brain Buster.</p>
      <form class="admin-form">
        <label for="loginEmail">Email <span aria-hidden="true">*</span></label>
        <input id="loginEmail" type="email" required>

        <label for="loginPassword">Password <span aria-hidden="true">*</span></label>
        <input id="loginPassword" type="password" required>

        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <p><a href="signup.html">Create new account</a></p>
    </section>
  </main>

  <script src="app.js"></script>
   
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <h3>Brain Buster</h3>
      <p>Learn, practice, and improve with interactive quizzes.</p>
    </div>

    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="subjects.html">Subjects</a>
      <a href="admin.html">Admin</a>
      <a href="login.html">Login</a>
      <a href="signup.html">Sign Up</a>
    </div>

    <section id="copyright">
      <p>© 2025 Yash Bansal. All rights reserved.</p>
    </section>
  </div>
</footer>

</body>
</html>

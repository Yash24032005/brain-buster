
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brain Buster - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .auth-bg { background: radial-gradient(circle at 0% 0%, #4f46e5 0%, #0f172a 50%), radial-gradient(circle at 100% 100%, #7c3aed 0%, #0f172a 50%); }
  </style>
</head>
<body class="auth-bg min-h-screen flex flex-col text-slate-200">

  <nav class="p-8">
    <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Brain Buster</a>
  </nav>

  <main class="flex-grow flex items-center justify-center px-4 pb-20">
    <section class="w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10 p-10 rounded-[2.5rem] shadow-2xl">
      <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold text-white tracking-tight">Welcome Back</h1>
        <p class="text-slate-400 mt-3 font-medium">Glad to see you again!</p>
      </div>

      <form class="space-y-6">
        <div>
          <label class="block text-sm font-semibold text-slate-300 mb-2 ml-1">Email Address</label>
          <input type="email" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all" placeholder="name@company.com" required>
        </div>

        <div>
          <div class="flex justify-between mb-2 ml-1">
            <label class="text-sm font-semibold text-slate-300">Password</label>
            <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300">Forgot?</a>
          </div>
          <input type="password" class="w-full bg-slate-900/50 border border-white/10 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all" placeholder="••••••••" required>
        </div>

        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-500/20 active:scale-[0.98] mt-4">
          Sign In
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-slate-400 text-sm">
          New here? <a href="signup.html" class="text-indigo-400 font-bold hover:underline underline-offset-4">Create account</a>
        </p>
      </div>
    </section>
  </main>

  <footer class="py-8 text-center border-t border-white/5 bg-slate-950/30">
    <p class="text-slate-500 text-sm">© 2026 Yash Bansal • Built for Speed</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
